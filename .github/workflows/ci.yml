name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Typecheck and build
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci --include=dev --silent

      - name: Verify exact official guarantee background
        run: npm run validate:guarantee-background

      - name: Validate batch mapping logic
        run: npm run validate:batch

      - name: Validate guarantee mapping logic
        run: npm run validate:guarantee

      - name: Verify TypeScript package is available
        run: node -e "console.log(require.resolve('typescript/lib/typescript.js'))"

      - name: Run typecheck
        id: typecheck
        continue-on-error: true
        run: npm run typecheck -- --pretty false 2>&1 | tee typecheck.log

      - name: Upload typecheck log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-log
          path: typecheck.log

      - name: Fail when typecheck failed
        if: steps.typecheck.outcome == 'failure'
        run: exit 1

      - name: Build application
        id: build
        continue-on-error: true
        run: npm run build 2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Fail when build failed
        if: steps.build.outcome == 'failure'
        run: exit 1
